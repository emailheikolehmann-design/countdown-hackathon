<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>DAN PXTxAI Hackathon Countdown</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: url('background.png') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
  }

  .overlay {
    background: rgba(0,0,0,0.55);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(6px);
  }

  h1 {
    margin-bottom: 20px;
    font-size: 32px;
  }

  #countdown {
    font-size: 50px;
    font-weight: bold;
  }
</style>
</head>

<body>

<div class="overlay">
  <h1>🚀 1st DAN PXTxAI Hackathon</h1>
  <div id="countdown"></div>
</div>

<script>
const targetDate = new Date("2026-06-09T10:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = targetDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML = "🔥 Es geht los!";
    return;
  }

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff % (1000*60*60*24))/(1000*60*60));
  const minutes = Math.floor((diff % (1000*60*60))/(1000*60));
  const seconds = Math.floor((diff % (1000*60))/1000);

  document.getElementById("countdown").innerHTML =
    `${days} Tage ${hours}h ${minutes}m ${seconds}s`;
}, 1000);
</script>

</body>
</html>
